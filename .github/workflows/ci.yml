name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default least-privilege.
permissions:
  contents: read

jobs:
  check:
    name: pnpm check (${{ matrix.os }} sox=${{ matrix.sox }})
    runs-on: ${{ matrix.os }}
    # `src/lib/` is pure TS/Node — no platform-specific code, so we run the
    # `without` variant on Linux only (the cheaper runner). The `with` variant
    # runs on both Linux and macOS because sox versions differ between apt
    # and Homebrew, and the cible utilisatrice est principalement macOS —
    # any divergence on the sox fast-path must be caught on the target OS.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sox: without
          - os: ubuntu-latest
            sox: with
          - os: macos-latest
            sox: with
    steps:
      - uses: actions/checkout@v6
        with:
          # Required for the integration tests that read real Teensy/
          # AudioMoth WAV fixtures from test-data/ (committed via LFS).
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install sox (Linux)
        if: matrix.sox == 'with' && runner.os == 'Linux'
        run: sudo apt-get install -y sox
      - name: Install sox (macOS)
        if: matrix.sox == 'with' && runner.os == 'macOS'
        run: brew install sox
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  smoke-build:
    name: smoke ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - name: Build binary
        run: pnpm build:${{ matrix.target }}
      - name: Smoke test — --version
        run: |
          OUTPUT=$(./dist/chiro-${{ matrix.target }} --version)
          echo "Got: $OUTPUT"
          if [[ "$OUTPUT" != chiro* ]]; then
            echo "::error::Expected output to start with 'chiro', got: $OUTPUT"
            exit 1
          fi
      - name: Smoke test — --help
        run: |
          OUTPUT=$(./dist/chiro-${{ matrix.target }} --help)
          echo "Got: $OUTPUT"
          if [[ -z "$OUTPUT" ]]; then
            echo "::error::--help produced no output"
            exit 1
          fi
