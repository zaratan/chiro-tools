name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# Default least-privilege: read-only. The `release` job opts up to write.
permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # version is read from the `packageManager` field of package.json
      # (pnpm@11.0.9 requires Node ≥ 22.13). Don't pin here to avoid
      # "Multiple versions" errors.
      - uses: pnpm/action-setup@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Sync package.json version with the git tag so CHIRO_VERSION
      # (compiled into the binary via src/version.ts) matches the release.
      # Without this step the binary always reports the last value committed
      # to package.json, regardless of the tag — which breaks the in-app
      # update check (the user sees a hint even after upgrading).
      - name: Sync package.json version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='${VERSION}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
      - run: pnpm install --frozen-lockfile
      # Catch import-cycle / type breakage before producing a binary.
      - run: pnpm typecheck
      - run: pnpm build:darwin-arm64
      - name: Verify binary version matches tag
        run: |
          EXPECTED="${GITHUB_REF_NAME#v}"
          ACTUAL=$(./dist/chiro-darwin-arm64 --version)
          if [[ "$ACTUAL" != "chiro ${EXPECTED}" ]]; then
            echo "::error::Binary reports '${ACTUAL}' but tag is '${GITHUB_REF_NAME}'"
            exit 1
          fi
      # Ad-hoc codesign so the binary runs without Gatekeeper quarantine on
      # first launch (no Apple Developer ID needed). The com.apple.quarantine
      # xattr is set on any curl-downloaded asset; without a valid signature,
      # Gatekeeper blocks the first run. `--sign -` produces an ad-hoc
      # signature accepted locally. Pattern used by gh, bun, deno.
      - name: Ad-hoc codesign (macOS)
        run: codesign --sign - --force --timestamp=none dist/chiro-darwin-arm64
      # Package as versioned tarball. `brew audit --new --strict` rejects URLs
      # pointing to a non-archive asset ("Stable should be a versioned
      # tarball/zip"). Same reason gh, bun, deno ship tarballs.
      - name: Package as tarball
        run: tar -czf dist/chiro-darwin-arm64.tar.gz -C dist chiro-darwin-arm64
      - uses: actions/upload-artifact@v7
        with:
          name: chiro-darwin-arm64
          path: dist/chiro-darwin-arm64.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # version is read from the `packageManager` field of package.json
      # (pnpm@11.0.9 requires Node ≥ 22.13). Don't pin here to avoid
      # "Multiple versions" errors.
      - uses: pnpm/action-setup@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # See note in build-macos: keep package.json in sync with the tag.
      - name: Sync package.json version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='${VERSION}'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build:linux-x64
      - name: Verify binary version matches tag
        run: |
          EXPECTED="${GITHUB_REF_NAME#v}"
          ACTUAL=$(./dist/chiro-linux-x64 --version)
          if [[ "$ACTUAL" != "chiro ${EXPECTED}" ]]; then
            echo "::error::Binary reports '${ACTUAL}' but tag is '${GITHUB_REF_NAME}'"
            exit 1
          fi
      # Match the macOS asset shape (tarball) so the Homebrew formula and
      # install.sh handle a single download/extract pattern across platforms.
      - name: Package as tarball
        run: tar -czf dist/chiro-linux-x64.tar.gz -C dist chiro-linux-x64
      - uses: actions/upload-artifact@v7
        with:
          name: chiro-linux-x64
          path: dist/chiro-linux-x64.tar.gz

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: chiro-darwin-arm64
          path: dist/
      - uses: actions/download-artifact@v8
        with:
          name: chiro-linux-x64
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/chiro-darwin-arm64.tar.gz \
            dist/chiro-linux-x64.tar.gz
